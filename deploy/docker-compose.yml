services:
  postgres:
    image: postgres:15
    container_name: whetstonez-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medusa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-medusa}
    volumes:
      - whetstonez_postgres_data:/var/lib/postgresql/data
    ports:
      # Port 5433 — does NOT touch your existing Postgres on 5432
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medusa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: whetstonez-redis
    restart: unless-stopped
    ports:
      # Port 6380 — does NOT touch your existing Redis on 6379
      - "127.0.0.1:6380:6379"
    volumes:
      - whetstonez_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  whetstonez_postgres_data:
  whetstonez_redis_data:
