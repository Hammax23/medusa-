# vyntechsolutions.ca — Whetstonez Ecommerce
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/whetstonez
#          sudo ln -sf /etc/nginx/sites-available/whetstonez /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# SSL:     sudo certbot --nginx -d vyntechsolutions.ca -d www.vyntechsolutions.ca -d api.vyntechsolutions.ca

# Storefront — https://vyntechsolutions.ca
server {
    listen 80;
    server_name vyntechsolutions.ca www.vyntechsolutions.ca;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Medusa API + Admin — https://api.vyntechsolutions.ca
server {
    listen 80;
    server_name api.vyntechsolutions.ca;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
