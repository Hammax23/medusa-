# Replace YOUR_DOMAIN and API_DOMAIN before use.
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/whetstonez
#          sudo ln -s /etc/nginx/sites-available/whetstonez /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# SSL:     sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN -d API_DOMAIN

# Storefront — https://YOUR_DOMAIN
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Medusa API + Admin — https://API_DOMAIN
server {
    listen 80;
    server_name API_DOMAIN;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
