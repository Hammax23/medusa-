# vyntechsolutions.ca — Whetstonez Ecommerce (isolated from other /var/www projects)
#
# SAFE INSTALL — does NOT remove or overwrite your other nginx sites.
# Only ADDS this config alongside existing ones.
#
# sudo cp deploy/nginx.conf /etc/nginx/sites-available/whetstonez
# sudo ln -sf /etc/nginx/sites-available/whetstonez /etc/nginx/sites-enabled/whetstonez
# sudo nginx -t && sudo systemctl reload nginx
#
# DO NOT run: sudo rm /etc/nginx/sites-enabled/default  (keeps other projects working)
#
# SSL: sudo certbot --nginx -d vyntechsolutions.ca -d www.vyntechsolutions.ca -d api.vyntechsolutions.ca

# Storefront — ports 8100 (internal only, not exposed to firewall)
server {
    listen 80;
    server_name vyntechsolutions.ca www.vyntechsolutions.ca;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Medusa API + Admin — port 9100 (internal only)
server {
    listen 80;
    server_name api.vyntechsolutions.ca;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:9100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
